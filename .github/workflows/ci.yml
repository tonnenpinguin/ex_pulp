name: CI

on:
  pull_request:
  push:
    branches: [main]

# Require approval for first-time contributors and external forks
# Configure at: Settings > Actions > General > "Require approval for all outside collaborators"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: mix-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ hashFiles('.tool-versions') }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Install solvers
        uses: ./.github/actions/setup-solvers

      - name: Run tests
        run: mix test

      - name: Check formatting
        run: mix format --check-formatted
